<div class="container">

  <app-header
    [ratedCount]="ratedCount()"
    [averageRating]="averageRating()"
  />

  <div class="toolbar">

    <button
      class="filter-btn"
      (click)="toggleFilter()">

      @if(showBestOnly()){

        Tout afficher

      } @else {

        Restaurants ≥ 4★

      }

    </button>

  </div>

  <app-restaurant-list
    [restaurants]="filteredRestaurants()"
    (restaurantRated)="updateRestaurantRating($event)"
  />

</div>
