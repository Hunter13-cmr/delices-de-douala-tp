<header class="header">

  <div class="overlay">

    <div class="header-content">

      <!-- Partie gauche -->
      <div class="header-text">

        <h1>🍽️Délices de Douala</h1>

        <p class="subtitle">
          Découvrez et notez les meilleurs restaurants de Douala
        </p>

      </div>

      <!-- Partie droite -->
      <div class="stats">

        <div class="stat-card">

          <span class="icon">⭐</span>

          <div>

            <h3>{{ ratedCount() }} / 6</h3>

            <p>Restaurants notés</p>

          </div>

        </div>

        <div class="stat-card">

          <span class="icon">🏆</span>

          <div>

            <h3>{{ averageRating() }}</h3>

            <p>Note moyenne</p>

          </div>

        </div>

      </div>

    </div>

  </div>

</header>
